<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>Dashboard</h1>
    <p class="login-sub">Research · Teaching · Advising</p>
    <label style="font-size:.82rem;font-weight:600;color:#4a5568;display:block;margin-bottom:.35rem;">User ID (Email)</label>
    <input type="email" id="email" placeholder="your@email.com" autofocus
           onkeydown="if(event.key==='Enter') login()">
    <label style="font-size:.82rem;font-weight:600;color:#4a5568;display:block;margin-bottom:.35rem;margin-top:.5rem;">Password</label>
    <input type="password" id="pw" placeholder="Password"
           onkeydown="if(event.key==='Enter') login()">
    <button class="btn btn-primary" onclick="login()">Sign In</button>
    <div class="error-msg" id="err"></div>
  </div>
</div>
<script src="config.js"></script>
<script src="api.js"></script>
<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('pw').value;
  if (!email || !pw) return;
  const err = document.getElementById('err');
  err.textContent = 'Signing in…';
  try {
    const profRes = await apiCall({ action: 'prof_login', email, password: pw });
    if (profRes.ok) {
      sessionStorage.setItem('prof_pw', pw);
      sessionStorage.setItem('prof_email', email);
      window.location.href = 'professor.html';
      return;
    }
    const stuRes = await apiCall({ action: 'student_login', email, student_password: pw });
    if (stuRes.ok) {
      sessionStorage.setItem('student_email', stuRes.email || email);
      sessionStorage.setItem('student_name', stuRes.name || '');
      sessionStorage.setItem('student_pw', pw);
      window.location.href = 'student.html';
      return;
    }
    err.textContent = 'Incorrect email or password.';
  } catch (e) {
    err.textContent = 'Connection error: ' + e.message;
  }
}
</script>
</body>
</html>
